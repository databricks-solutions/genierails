  - name: Vietnamese Passport
    country: VN
    column_hints:
      - passport_vn
      - vietnam_passport
    format: "1 letter + 8 digits"
    sensitivity: restricted
    masking_function: mask_passport
    category: government_id

masking_functions:
  # ── Singapore ──────────────────────────────────────────────────────────────
  - name: mask_nric
    signature: "mask_nric(nric STRING) RETURNS STRING"
    comment: "Singapore NRIC — show first letter and last 4 characters (e.g. S****567D)"
    body: |
      CASE
        WHEN nric IS NULL THEN NULL
        WHEN LENGTH(TRIM(nric)) >= 5 THEN
          CONCAT(LEFT(TRIM(nric), 1), REPEAT('*', LENGTH(TRIM(nric)) - 5), RIGHT(TRIM(nric), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_fin
    signature: "mask_fin(fin STRING) RETURNS STRING"
    comment: "Singapore FIN — show first letter and last 4 characters (same pattern as NRIC)"
    body: |
      CASE
        WHEN fin IS NULL THEN NULL
        WHEN LENGTH(TRIM(fin)) >= 5 THEN
          CONCAT(LEFT(TRIM(fin), 1), REPEAT('*', LENGTH(TRIM(fin)) - 5), RIGHT(TRIM(fin), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_uen
    signature: "mask_uen(uen STRING) RETURNS STRING"
    comment: "Singapore UEN — show last 4 characters only"
    body: |
      CASE
        WHEN uen IS NULL THEN NULL
        WHEN LENGTH(TRIM(uen)) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(TRIM(uen)) - 4), RIGHT(TRIM(uen), 4))
        ELSE '[REDACTED]'
      END

  # ── Malaysia ───────────────────────────────────────────────────────────────
  - name: mask_mykad
    signature: "mask_mykad(ic STRING) RETURNS STRING"
    comment: "Malaysian MyKad/IC — show last 4 digits only. WARNING: MyKad first 6 digits encode DOB."
    body: |
      CASE
        WHEN ic IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(ic, '[^0-9]', '')) = 12 THEN
          CONCAT('XXXXXXXX', RIGHT(REGEXP_REPLACE(ic, '[^0-9]', ''), 4))
        ELSE '[INVALID IC]'
      END

  - name: mask_tin_my
    signature: "mask_tin_my(tin STRING) RETURNS STRING"
    comment: "Malaysian Tax ID — show last 4 characters only"
    body: |
      CASE
        WHEN tin IS NULL THEN NULL
        WHEN LENGTH(TRIM(tin)) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(TRIM(tin)) - 4), RIGHT(TRIM(tin), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_ssm
    signature: "mask_ssm(ssm STRING) RETURNS STRING"
    comment: "Malaysian SSM company registration — show last 4 characters only"
    body: |
      CASE
        WHEN ssm IS NULL THEN NULL
        WHEN LENGTH(TRIM(ssm)) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(TRIM(ssm)) - 4), RIGHT(TRIM(ssm), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_epf
    signature: "mask_epf(epf STRING) RETURNS STRING"
    comment: "Malaysian EPF/KWSP number — show last 4 characters only"
    body: |
      CASE
        WHEN epf IS NULL THEN NULL
        WHEN LENGTH(TRIM(epf)) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(TRIM(epf)) - 4), RIGHT(TRIM(epf), 4))
        ELSE '[REDACTED]'
      END

  # ── Thailand ──────────────────────────────────────────────────────────────
  - name: mask_thai_id
    signature: "mask_thai_id(tid STRING) RETURNS STRING"
    comment: "Thai National ID (13 digits) — show last 4 digits only"
    body: |
      CASE
        WHEN tid IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(tid, '[^0-9]', '')) = 13 THEN
          CONCAT('XXXXXXXXX', RIGHT(REGEXP_REPLACE(tid, '[^0-9]', ''), 4))
        WHEN LENGTH(REGEXP_REPLACE(tid, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(tid, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(tid, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  # ── Indonesia ─────────────────────────────────────────────────────────────
  - name: mask_nik
    signature: "mask_nik(nik STRING) RETURNS STRING"
    comment: "Indonesian NIK/KTP (16 digits) — show last 4 only. First 6 encode birthdate."
    body: |
      CASE
        WHEN nik IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(nik, '[^0-9]', '')) = 16 THEN
          CONCAT('XXXXXXXXXXXX', RIGHT(REGEXP_REPLACE(nik, '[^0-9]', ''), 4))
        WHEN LENGTH(REGEXP_REPLACE(nik, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(nik, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(nik, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_npwp
    signature: "mask_npwp(npwp STRING) RETURNS STRING"
    comment: "Indonesian NPWP tax ID (15-16 digits) — show last 4 only"
    body: |
      CASE
        WHEN npwp IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(npwp, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(npwp, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(npwp, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_bpjs
    signature: "mask_bpjs(bpjs STRING) RETURNS STRING"
    comment: "Indonesian BPJS social insurance (13 digits) — show last 4 only"
    body: |
      CASE
        WHEN bpjs IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(bpjs, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(bpjs, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(bpjs, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  # ── Philippines ───────────────────────────────────────────────────────────
  - name: mask_philsys
    signature: "mask_philsys(psn STRING) RETURNS STRING"
    comment: "Philippine PhilSys national ID (12 digits) — show last 4 only"
    body: |
      CASE
        WHEN psn IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(psn, '[^0-9]', '')) = 12 THEN
          CONCAT('XXXXXXXX', RIGHT(REGEXP_REPLACE(psn, '[^0-9]', ''), 4))
        WHEN LENGTH(REGEXP_REPLACE(psn, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(psn, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(psn, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_tin_ph
    signature: "mask_tin_ph(tin STRING) RETURNS STRING"
    comment: "Philippine TIN (9-12 digits) — show last 4 only"
    body: |
      CASE
        WHEN tin IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(tin, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(tin, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(tin, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_sss_ph
    signature: "mask_sss_ph(sss STRING) RETURNS STRING"
    comment: "Philippine SSS number (10 digits, XX-XXXXXXX-X) — show last 4 only"
    body: |
      CASE
        WHEN sss IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(sss, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(sss, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(sss, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  # ── Vietnam ───────────────────────────────────────────────────────────────
  - name: mask_cccd
    signature: "mask_cccd(cccd STRING) RETURNS STRING"
    comment: "Vietnamese CCCD citizen ID (12 digits) — show last 4 only. First 3 encode province."
    body: |
      CASE
        WHEN cccd IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(cccd, '[^0-9]', '')) = 12 THEN
          CONCAT('XXXXXXXX', RIGHT(REGEXP_REPLACE(cccd, '[^0-9]', ''), 4))
        WHEN LENGTH(REGEXP_REPLACE(cccd, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(cccd, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(cccd, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

  - name: mask_mst
    signature: "mask_mst(mst STRING) RETURNS STRING"
    comment: "Vietnamese MST tax code (10 or 13 digits) — show last 4 only"
    body: |
      CASE
        WHEN mst IS NULL THEN NULL
        WHEN LENGTH(REGEXP_REPLACE(mst, '[^0-9]', '')) >= 4 THEN
          CONCAT(REPEAT('*', LENGTH(REGEXP_REPLACE(mst, '[^0-9]', '')) - 4), RIGHT(REGEXP_REPLACE(mst, '[^0-9]', ''), 4))
        ELSE '[REDACTED]'
      END

prompt_overlay: |
  ### Country-Specific Identifiers: Southeast Asia (SG, MY, TH, ID, PH, VN)

  When analyzing Southeast Asian datasets, be aware of these regulated identifiers
  across six ASEAN countries. Pay attention to column naming patterns and data
  format/length to choose the correct masking function.

  **Singapore — Government IDs:**
  - NRIC (National Registration Identity Card): 1 letter (S/T for citizens, F/G/M for foreigners)
    + 7 digits + 1 check letter (e.g. S1234567D). Total 9 characters.
    Columns: `nric`, `nric_number`, `nric_no`, `sg_nric`.
    Regulated by PDPA 2012. Use `mask_nric` — show first letter + last 4 chars.
  - FIN (Foreign Identification Number): Same format as NRIC but starts with F/G/M.
    Columns: `fin`, `fin_number`. Use `mask_fin` — same pattern as NRIC.
  - CPF Account Number: Same as the individual's NRIC.
    Columns: `cpf`, `cpf_account`. Use `mask_nric`.
  - UEN (Unique Entity Number): 9-10 character business registration.
    Columns: `uen`, `uen_number`, `company_uen`. Use `mask_uen` — show last 4 chars.

  **Malaysia — Government IDs:**
  - MyKad (Malaysian IC/NRIC): 12 digits with format YYMMDD-PB-NNNG.
    CRITICAL: The first 6 digits encode the holder's date of birth, and digits 7-8
    encode birthplace. Even partial exposure of a MyKad reveals sensitive personal data.
    Columns: `mykad`, `ic_number`, `ic_no`, `kad_pengenalan`, `no_kp`.
    Regulated by PDPA 2010. Use `mask_mykad` — show last 4 digits ONLY.
  - MyKAS, MyTentera: Same 12-digit format. Use `mask_mykad`.
  - Malaysian TIN: Columns: `tin`, `tax_id`, `cukai`. Use `mask_tin_my`.
  - SSM Registration: Columns: `ssm`, `ssm_number`, `company_reg`. Use `mask_ssm`.
  - EPF/KWSP: Columns: `epf`, `kwsp`, `epf_number`. Use `mask_epf`.

  **Thailand — Government IDs:**
  - Thai National ID: 13 digits (X-XXXX-XXXXX-XX-X).
    Columns: `thai_id`, `national_id_th`, `th_id`.
    Regulated by PDPA B.E. 2562 (2019). Use `mask_thai_id` — show last 4 digits.
  - Thai Tax ID: Same 13-digit format as National ID for individuals.
    Columns: `tax_id_th`, `tin_th`. Use `mask_thai_id`.

  **Indonesia — Government IDs:**
  - NIK (Nomor Induk Kependudukan): 16 digits. CRITICAL: First 6 digits encode
    birthdate (like Malaysian MyKad). Digits 7-10 encode district.
    Columns: `nik`, `nik_number`, `ktp_number`, `nomor_ktp`.
    Regulated by PDP Law No. 27/2022. Use `mask_nik` — show last 4 digits ONLY.
  - NPWP (Tax ID): 15-16 digits.
    Columns: `npwp`, `npwp_number`, `tax_id_id`. Use `mask_npwp` — show last 4.
  - BPJS (Social Insurance): 13 digits.
    Columns: `bpjs`, `bpjs_number`. Use `mask_bpjs` — show last 4.

  **Philippines — Government IDs:**
  - PhilSys ID (Philippine National ID): 12 digits.
    Columns: `philsys`, `psn`, `philippine_id`.
    Regulated by DPA 2012 (RA 10173). Use `mask_philsys` — show last 4 digits.
  - TIN (Bureau of Internal Revenue): 9-12 digits.
    Columns: `tin_ph`, `tax_id_ph`, `bir_tin`. Use `mask_tin_ph` — show last 4.
  - SSS (Social Security System): 10 digits (XX-XXXXXXX-X).
    Columns: `sss`, `sss_number`. Use `mask_sss_ph` — show last 4.

  **Vietnam — Government IDs:**
  - CCCD (Citizen Identity Card): 12 digits. First 3 encode province,
    digit 4 encodes gender and birth century.
    Columns: `cccd`, `cmnd`, `citizen_id_vn`, `can_cuoc`.
    Regulated by Decree 13/2023/ND-CP. Use `mask_cccd` — show last 4 digits.
  - MST (Tax Code): 10 digits (individuals) or 13 digits (branches).
    Columns: `mst`, `ma_so_thue`, `tax_id_vn`. Use `mask_mst` — show last 4.

  **Disambiguating SG vs MY NRIC columns:**
  Both countries use `nric` and `ic_number` as column names, but:
  - Singapore NRIC: 9 characters (letter + 7 digits + letter)
  - Malaysian MyKad: 12 digits (may include hyphens: YYMMDD-PB-NNNG)
  If the dataset contains records from both countries, check the data format/length.
  When in doubt, use the more restrictive masking (show fewer characters).

  **Embedded birthdate warning:** Indonesian NIK (first 6 digits), Malaysian MyKad
  (first 6 digits), and Vietnamese CCCD (digit 4 encodes century) all embed
  demographic data in the ID number. Always mask aggressively — show last 4 only.

  **Available SEA Masking Functions:**
  - `mask_nric(nric STRING)` — SG NRIC, first letter + last 4 chars (S****567D)
  - `mask_fin(fin STRING)` — SG FIN, first letter + last 4 chars
  - `mask_uen(uen STRING)` — SG UEN, last 4 chars visible
  - `mask_mykad(ic STRING)` — MY MyKad, last 4 digits only (XXXXXXXX1234)
  - `mask_tin_my(tin STRING)` — MY tax ID, last 4 chars visible
  - `mask_ssm(ssm STRING)` — MY SSM registration, last 4 chars visible
  - `mask_epf(epf STRING)` — MY EPF/KWSP, last 4 chars visible
  - `mask_thai_id(tid STRING)` — TH National ID, last 4 digits (XXXXXXXXX1234)
  - `mask_nik(nik STRING)` — ID NIK/KTP, last 4 digits (XXXXXXXXXXXX1234)
  - `mask_npwp(npwp STRING)` — ID NPWP tax, last 4 digits
  - `mask_bpjs(bpjs STRING)` — ID BPJS social insurance, last 4 digits
  - `mask_philsys(psn STRING)` — PH PhilSys national ID, last 4 digits
  - `mask_tin_ph(tin STRING)` — PH TIN, last 4 digits
  - `mask_sss_ph(sss STRING)` — PH SSS, last 4 digits
  - `mask_cccd(cccd STRING)` — VN CCCD citizen ID, last 4 digits
  - `mask_mst(mst STRING)` — VN MST tax code, last 4 digits

  **Regulatory context:**
  - PDPA 2012 (Singapore): NRIC collection restricted since 2019.
  - PDPA 2010 (Malaysia): MyKad classified as sensitive (embedded biometrics).
  - PDPA B.E. 2562 (Thailand, 2019): Comprehensive data protection, effective June 2022.
    Significant fines for non-compliance (up to THB 5 million).
  - PDP Law No. 27/2022 (Indonesia): Enacted October 2022, enforcement from October 2024.
    Heavy penalties (up to 2% of annual revenue). NIK is classified as specific personal data.
  - DPA 2012 / RA 10173 (Philippines): Enforced by National Privacy Commission.
    PhilSys data has additional protections under RA 11055.
  - Decree 13/2023/ND-CP (Vietnam): Personal data protection effective July 2023.
    Cross-border data transfer requires impact assessment.
  - MAS Technology Risk Management Guidelines (Singapore): Financial institutions must
    implement data masking for sensitive customer identifiers.

  When you encounter columns matching these patterns, prefer the SEA-specific masking
  functions over generic ones. Pay special attention to NIK (Indonesia) and MyKad
  (Malaysia) — their embedded demographic data means even partial exposure is a
  privacy risk.
